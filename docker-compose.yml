version: "3.9"

services:
  api:
    build: .
    container_name: 1905-api
    ports:
      - "5000:5000"
    environment:
      - TZ=Asia/Shanghai
      - CHROMIUM_PATH=/usr/bin/chromium
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
